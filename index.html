<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Varahi Export | Premium Accounting & GST Billing SaaS</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <!-- PWA Mobile Web App Configuration -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Varahi Export">
  <link rel="apple-touch-icon" href="icon-512.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7C3AED">

  <!-- Typography & Design system font pairings -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Phosphor Icons (Vector only assets) -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- Chart.js (Dynamic Data Visualizations) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Premium Framer Motion-Style Splash Screen -->
  <div id="app-splash-screen" class="splash-screen">
    <div class="splash-content">
      <div class="splash-logo-container">
        <svg class="splash-logo-svg" viewBox="0 0 24 24" width="80" height="80">
          <path class="splash-path" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v-1.07zm5.9-4.8c-.2 1.3-.7 2.5-1.5 3.5l-1.4-1.4c.5-.7.9-1.5 1-2.4l1.9.3zm-.1-2.2l-1.9-.3c-.1-.9-.5-1.7-1-2.4l1.4-1.4c.8 1 1.3 2.2 1.5 3.5z" fill="none" stroke="url(#logo-grad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          <defs>
            <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#A78BFA" />
              <stop offset="100%" stop-color="#7C3AED" />
            </linearGradient>
          </defs>
        </svg>
        <div class="logo-pulse-ring"></div>
      </div>
      <h1 class="splash-title">
        <span class="char">V</span>
        <span class="char">A</span>
        <span class="char">R</span>
        <span class="char">A</span>
        <span class="char">H</span>
        <span class="char">I</span>
        <span class="char">&nbsp;</span>
        <span class="char">E</span>
        <span class="char">X</span>
        <span class="char">P</span>
        <span class="char">O</span>
        <span class="char">R</span>
        <span class="char">T</span>
        <span class="char">S</span>
      </h1>
      <p class="splash-subtitle">Premium Fabric Accounting Suite</p>
      <div class="splash-loader-bar">
        <div class="splash-loader-progress"></div>
      </div>
    </div>
  </div>

  <div id="root"></div>

  <script>
    // Dismiss Splash Screen exactly after load transitions cycle completes
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const splash = document.getElementById('app-splash-screen');
        if (splash) {
          splash.classList.add('exit');
        }
      }, 2300);
    });
  </script>

  <script type="module" src="/src/main.jsx"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker registered successfully!', reg.scope))
          .catch(err => console.log('Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
